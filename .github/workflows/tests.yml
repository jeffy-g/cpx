name: Node.js CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    name: Node ${{ matrix.node-version }} / ${{ matrix.os }}

    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        node-version: ["14.14.0", 16.x, 18.x, 20.x, 22.x, 24.x]
        os: [ubuntu-latest, macos-latest, windows-latest]
        exclude:
        - os: macos-latest
          node-version: "14.14.0"
        - os: macos-latest
          node-version: 16.x

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
        cache: yarn
    - name: install then test
      run: |
        yarn install
        echo "- - - - - - - - - - - - - - - - - - - - - - - - - - - -"
        echo '                       test'
        echo "- - - - - - - - - - - - - - - - - - - - - - - - - - - -"
        yarn test
